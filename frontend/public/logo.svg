<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="300" height="320">
  <!-- 吹き出し -->
  <ellipse cx="200" cy="50" rx="90" ry="38" fill="#fff" stroke="#333" stroke-width="2.5"/>
  <polygon points="160,80 145,110 175,78" fill="#fff" stroke="#fff" stroke-width="1"/>
  <line x1="160" y1="80" x2="145" y2="110" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="145" y1="110" x2="175" y2="78" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  <text x="200" y="46" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="14" font-weight="bold" fill="#333">なんでも</text>
  <text x="200" y="66" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif" font-size="14" font-weight="bold" fill="#333">聞いてや！</text>

  <!-- 体 -->
  <rect x="85" y="200" rx="20" ry="20" width="110" height="100" fill="#4A90D9"/>

  <!-- 首 -->
  <rect x="120" y="190" width="40" height="25" fill="#F5C9A0" rx="3"/>

  <!-- 頭 -->
  <circle cx="140" cy="160" r="55" fill="#F5C9A0"/>

  <!-- 頭のテカリ -->
  <ellipse cx="125" cy="135" rx="20" ry="12" fill="#FDDBB5" opacity="0.6"/>

  <!-- 眉毛 -->
  <path d="M108 148 Q118 140 128 148" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M152 148 Q162 140 172 148" stroke="#333" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 目 -->
  <ellipse cx="118" cy="158" rx="6" ry="7" fill="#333"/>
  <ellipse cx="162" cy="158" rx="6" ry="7" fill="#333"/>
  <circle cx="116" cy="155" r="2" fill="#fff"/>
  <circle cx="160" cy="155" r="2" fill="#fff"/>

  <!-- 鼻 -->
  <ellipse cx="140" cy="170" rx="4" ry="3" fill="#E8B08A"/>

  <!-- 口（大きく開いてしゃべってる感じ） -->
  <path d="M118 182 Q140 210 162 182" fill="#C0392B" stroke="#333" stroke-width="2"/>
  <path d="M122 182 Q140 195 158 182" fill="#fff"/>

  <!-- 耳 -->
  <ellipse cx="85" cy="162" rx="10" ry="14" fill="#F5C9A0" stroke="#E8B08A" stroke-width="1"/>
  <ellipse cx="195" cy="162" rx="10" ry="14" fill="#F5C9A0" stroke="#E8B08A" stroke-width="1"/>

  <!-- 左腕 -->
  <path d="M85 220 Q60 240 50 270" stroke="#4A90D9" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- 左手 -->
  <circle cx="48" cy="274" r="10" fill="#F5C9A0"/>

  <!-- 右腕（マイクを持ち上げてる） -->
  <path d="M195 215 Q220 200 235 175" stroke="#4A90D9" stroke-width="18" fill="none" stroke-linecap="round"/>
  <!-- 右手 -->
  <circle cx="237" cy="170" r="10" fill="#F5C9A0"/>

  <!-- マイク -->
  <rect x="233" y="130" width="8" height="40" rx="3" fill="#555"/>
  <ellipse cx="237" cy="126" rx="11" ry="14" fill="#333"/>
  <ellipse cx="237" cy="126" rx="9" ry="12" fill="#555"/>
  <!-- マイクの網目模様 -->
  <line x1="230" y1="120" x2="244" y2="120" stroke="#777" stroke-width="0.8"/>
  <line x1="229" y1="124" x2="245" y2="124" stroke="#777" stroke-width="0.8"/>
  <line x1="230" y1="128" x2="244" y2="128" stroke="#777" stroke-width="0.8"/>
  <line x1="231" y1="132" x2="243" y2="132" stroke="#777" stroke-width="0.8"/>

  <!-- 足 -->
  <rect x="100" y="295" width="30" height="20" rx="10" fill="#333"/>
  <rect x="150" y="295" width="30" height="20" rx="10" fill="#333"/>
</svg>
